<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dasOS // The Fabric of Bitopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --bg-deep: #02040A; 
            --glass-bg: rgba(6, 11, 20, 0.5);
            --glass-border: rgba(0, 240, 255, 0.15);
            --cyan: #00F0FF; --gold: #D4AF37; --purple: #A855F7; --btc: #F7931A;
        }

        body { 
            margin: 0; overflow: hidden; height: 100vh; background-color: var(--bg-deep);
            font-family: 'Inter', sans-serif; color: #E2E8F0; user-select: none; perspective: 2000px;
        }

        /* --- 1. THE LIVING BACKGROUND --- */
        .void-bg { position: absolute; inset: 0; z-index: -10; background: radial-gradient(circle at 50% 50%, #061122, var(--bg-deep)); }
        
        .parallax-wrapper {
            position: absolute; inset: -5%; display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d; transition: transform 0.1s ease-out; z-index: 0;
        }

        /* --- 2. BITOPIA (THE PLANET) --- */
        .bitopia-planet {
            position: absolute; width: 220px; height: 220px; border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, rgba(0, 240, 255, 0.15), rgba(0,0,0,0.95));
            box-shadow: 0 0 80px rgba(0, 240, 255, 0.1), inset 0 0 40px rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(0,240,255,0.05); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center; overflow: hidden; transform-style: preserve-3d;
        }

        .planet-grid {
            position: absolute; inset: 0; border-radius: 50%; opacity: 0;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.3) 1px, transparent 1px);
            background-size: 20px 20px; background-position: center;
            transform: scale(1.1); transition: all 1s ease; mask-image: radial-gradient(circle at center, black 40%, transparent 70%); -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 70%);
        }
        
        .forge-mode .bitopia-planet { box-shadow: 0 0 100px rgba(0, 240, 255, 0.4), inset 0 0 60px rgba(0, 240, 255, 0.6); background: rgba(0,0,0,0.9); }
        .forge-mode .planet-grid { opacity: 1; transform: scale(1) rotateX(20deg); animation: grid-spin 20s linear infinite; cursor: crosshair; pointer-events: auto; }
        @keyframes grid-spin { 100% { background-position: 20px 20px; } }

        /* --- 3. THE CRYPTOGRAPHIC RING --- */
        .dyson-ring-framework {
            position: absolute; width: 700px; height: 700px; border-radius: 50%;
            border: 1px solid rgba(0, 240, 255, 0.2); transform-style: preserve-3d;
            box-shadow: 0 0 40px rgba(0,240,255,0.05), inset 0 0 40px rgba(0,240,255,0.05);
            animation: ring-spin 180s linear infinite;
        }
        @keyframes ring-spin { 0% { transform: rotateX(75deg) rotateZ(0deg); } 100% { transform: rotateX(75deg) rotateZ(360deg); } }

        /* DECOUPLED BLOCK MATHEMATICS */
        .block-orbit-position {
            position: absolute; top: 50%; left: 50%; transform-style: preserve-3d; pointer-events: none;
        }

        /* The Data Uplinks (Raining from Cosmos) - Perfectly parallel now */
        .cryptographic-uplink {
            position: absolute; left: 0; top: 0; width: 2px; height: 200px;
            background: linear-gradient(to top, var(--cyan), transparent);
            transform-origin: bottom center;
            /* Pointing straight up on the Z axis, hitting the top of the block perfectly */
            transform: translate(-50%, -100%) rotateX(-90deg) translateZ(14px); 
            opacity: 0.15; transition: all 0.4s ease; pointer-events: none;
        }
        .block-interactive.hovered ~ .cryptographic-uplink {
            opacity: 1; height: 350px; box-shadow: 0 0 20px var(--cyan);
        }

        .block-local-rotation {
            position: absolute; top: 0; left: 0; transform-style: preserve-3d;
        }

        .block-interactive {
            position: absolute; top: -20px; left: -20px; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            transform-style: preserve-3d; cursor: pointer; pointer-events: auto; z-index: 10;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .block-interactive.hovered { z-index: 100; transform: scale(1.8) translateZ(10px); }

        .cube-3d { width: 28px; height: 28px; transform-style: preserve-3d; transform: rotateX(-90deg) rotateY(0deg) rotateZ(45deg); }
        .block-interactive.hovered .cube-3d { filter: drop-shadow(0 0 20px var(--cyan)); }
        
        .cube-face { position: absolute; width: 28px; height: 28px; border: 1px solid rgba(0,240,255,0.4); box-shadow: inset 0 0 12px rgba(0,0,0,0.8); }
        .face-top { transform: rotateX(90deg) translateZ(14px); background: linear-gradient(135deg, rgba(0,240,255,0.8), rgba(0,240,255,0.2)); }
        .face-front { transform: translateZ(14px); background: linear-gradient(180deg, rgba(0,180,255,0.8), rgba(0,100,200,0.2)); }
        .face-right { transform: rotateY(90deg) translateZ(14px); background: linear-gradient(180deg, rgba(0,150,255,0.8), rgba(0,50,150,0.2)); }

        .gold-top { transform: rotateX(90deg) translateZ(14px); background: linear-gradient(135deg, #FDE047, rgba(212,175,55,0.4)); border-color: rgba(212,175,55,0.6); }
        .gold-front { transform: translateZ(14px); background: linear-gradient(180deg, #D4AF37, rgba(161,98,7,0.4)); border-color: rgba(212,175,55,0.6); }
        .gold-right { transform: rotateY(90deg) translateZ(14px); background: linear-gradient(180deg, #A16207, rgba(113,63,18,0.4)); border-color: rgba(212,175,55,0.6); }

        /* --- 4. UNIFIED OS GLASS UI --- */
        .dasos-glass {
            background: rgba(4, 8, 16, 0.5); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .dasos-topbar { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); border-radius: 20px; padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; width: 80%; max-width: 1200px; z-index: 70; }
        .dasos-dock { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); border-radius: 24px; padding: 10px 16px; display: flex; gap: 20px; z-index: 70; }
        
        .dock-icon { width: 48px; height: 48px; border-radius: 12px; border: 1px solid rgba(0,240,255,0.1); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.7); transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; position: relative; background: rgba(0,0,0,0.2); }
        .dock-icon svg { width: 24px; height: 24px; }
        .dock-icon:hover { transform: scale(1.3) translateY(-10px); margin: 0 8px; border-color: var(--cyan); color: var(--cyan); background: rgba(0, 240, 255, 0.2); box-shadow: 0 10px 25px rgba(0,240,255,0.2); z-index: 80;}
        .dock-icon.active { border-color: var(--cyan); color: var(--cyan); background: rgba(0,240,255,0.1); }
        .dock-icon.active::after { content: ''; position: absolute; bottom: -8px; width: 20px; height: 3px; background: var(--cyan); border-radius: 2px; box-shadow: 0 0 10px var(--cyan); }

        .widget-panel-left { position: fixed; top: 90px; left: 24px; width: 320px; display: flex; flex-direction: column; gap: 16px; z-index: 45; pointer-events: none; }
        .widget-panel-right { position: fixed; top: 90px; right: 24px; width: 260px; display: flex; flex-direction: column; gap: 16px; z-index: 45; pointer-events: none; }
        .widget { border-radius: 16px; padding: 16px; pointer-events: auto; }

        .dasos-window { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); width: 900px; height: 580px; border-radius: 16px; display: flex; flex-direction: column; z-index: 60; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(6, 11, 20, 0.85); }
        .dasos-window.open { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); }

        .window-titlebar { height: 48px; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; padding: 0 20px; background: rgba(0,0,0,0.4); justify-content: space-between; border-radius: 16px 16px 0 0; }
        .window-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--cyan); letter-spacing: 0.1em; text-transform: uppercase; font-weight: bold; }
        .window-controls { display: flex; gap: 12px; }
        .win-btn { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono'; font-size: 12px; }
        .win-btn:hover { color: var(--cyan); }
        
        .window-content { flex: 1; display: flex; overflow: hidden; border-radius: 0 0 16px 16px; }
        .sidebar { width: 220px; background: rgba(0,0,0,0.3); border-right: 1px solid var(--glass-border); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .sidebar-item { padding: 10px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.2s; color: #94A3B8; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(0,240,255,0.1); color: #fff; box-shadow: inset 2px 0 0 var(--cyan); }
        
        .main-view { flex: 1; padding: 32px; overflow-y: auto; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 4px; }

        @keyframes beam-up { 0% { height: 0; opacity: 1; } 100% { height: 350px; opacity: 0; } }
        .action-beam { position: absolute; bottom: 0; left: 50%; width: 4px; background: var(--cyan); transform: translateX(-50%); box-shadow: 0 0 20px var(--cyan); pointer-events: none; z-index: 60; }

        .node-inspector-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 100;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .node-inspector-overlay.active { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [activeApp, setActiveApp] = React.useState(null); 
            const [sidebarTab, setSidebarTab] = React.useState('overview');
            const [mousePos, setMousePos] = React.useState({ x: 0, y: 0 });
            
            const [hoveredBlockId, setHoveredBlockId] = React.useState(null);
            const [selectedBlock, setSelectedBlock] = React.useState(null); 

            // MACRO-ECONOMY
            const [eWatts, setEWatts] = React.useState(38450.50); 
            const [sov, setSov] = React.useState(18450.00); 
            const [gov, setGov] = React.useState(850); 
            const [btc, setBtc] = React.useState(24.505); 
            const [epoch, setEpoch] = React.useState(1042);
            
            // DATA
            const [blocks, setBlocks] = React.useState(Array.from({length: 12}, (_, i) => ({ 
                id: i, angle: i * 30, radius: 350, type: i % 4 === 0 ? 'rwa' : 'core' 
            })));
            const [telemetry, setTelemetry] = React.useState(["[SYS] Bitopia Core Synchronized."]);
            const [actionBeam, setActionBeam] = React.useState(false);

            // ENGINE LOOP
            React.useEffect(() => {
                const handleMouseMove = (e) => {
                    const x = (e.clientX / window.innerWidth) * 2 - 1;
                    const y = (e.clientY / window.innerHeight) * 2 - 1;
                    setMousePos({ x, y });
                };
                window.addEventListener('mousemove', handleMouseMove);

                const interval = setInterval(() => {
                    setEWatts(p => +(p + 4.5).toFixed(2));
                    setEpoch(p => p + 1);
                    if(Math.random() > 0.7) setTelemetry(prev => [...prev.slice(-6), `[EPOCH ${epoch}] Hashrate nominal. Orbit stable.`]);
                }, 2000);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    clearInterval(interval);
                };
            }, [epoch]);

            const triggerBeam = () => {
                setActionBeam(true);
                setTimeout(() => setActionBeam(false), 800);
            };

            const forgeBlock = () => {
                if(eWatts < 1500) return;
                triggerBeam();
                setEWatts(p => p - 1500);
                const newAngle = blocks.length * 15;
                setBlocks(p => [...p, { id: p.length + 1, angle: newAngle, radius: 350, type: 'core' }]);
                setTelemetry(prev => [...prev.slice(-6), `[FORGE] Physical matter synthesized on Ledger.`]);
            };

            const handleBlockClick = (block) => {
                setSelectedBlock(block);
                setTelemetry(prev => [...prev.slice(-6), `[SYS] Inspecting Node Hash #${block.id.toString().padStart(4, '0')}`]);
            };

            // SVGs
            const IconIdentity = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;
            const IconBank = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="2" y="6" width="20" height="12" rx="2"></rect><circle cx="12" cy="12" r="2"></circle><path d="M6 12h.01M18 12h.01"></path></svg>;
            const IconSenate = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M3 21h18M4 21V7M20 21V7M7 21v-4a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4M12 7v10M12 3v4"></path></svg>;
            const IconForge = () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"></path></svg>;

            const renderAppContent = () => {
                if (activeApp === 'forge') return (
                    <div className="flex h-full">
                        <div className="sidebar">
                            <div className="text-[10px] text-cyan-400 font-mono mb-4 px-2 tracking-widest">CIVILIZATION</div>
                            <div className="sidebar-item active">Orbital Forge</div>
                        </div>
                        <div className="main-view scroll-custom relative">
                            <h2 className="text-2xl font-bold mb-2">Bitopia Digital Twin</h2>
                            <p className="text-sm text-gray-400 mb-6">Click directly on the Planet Grid to claim spatial sectors, or forge physical blocks onto the orbital Megastructure.</p>
                            
                            <div className="bg-black/40 border border-white/10 rounded-xl p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="font-bold text-white">Synthesize Matter</h3>
                                    <span className="text-[10px] bg-cyan-900/40 text-cyan-400 px-2 py-1 rounded font-mono">Cost: 1,500 EW</span>
                                </div>
                                <p className="text-xs text-gray-400 mb-6 leading-relaxed">Burns E-WATT to construct a new structural node on the Dyson ring. This node will weave into the cryptographic fabric and increase total network yield.</p>
                                <button onClick={forgeBlock} className="w-full bg-cyan-600/20 hover:bg-cyan-500/40 border border-cyan-500 text-cyan-300 py-3 rounded-lg text-sm font-bold transition-all shadow-[0_0_15px_rgba(0,240,255,0.2)]">
                                    Execute Forge Sequence
                                </button>
                            </div>
                        </div>
                    </div>
                );
                return <div className="p-8 text-center text-gray-400 font-mono mt-20">SYSTEM DATA ROUTING...<br/><br/>(Explore the Forge to see the Digital Twin interaction)</div>;
            };

            const openApp = (app) => { setActiveApp(app === activeApp ? null : app); };

            const parallaxStyle = { transform: `rotateX(${mousePos.y * -8}deg) rotateY(${mousePos.x * 8}deg) translateZ(50px)` };

            return (
                <div className={`h-screen w-full relative ${activeApp === 'forge' ? 'forge-mode' : ''}`}>
                    
                    <div className="void-bg"></div>
                    
                    {/* PARALLAX 3D UNIVERSE */}
                    <div className="parallax-wrapper" style={parallaxStyle}>
                        
                        <div className="bitopia-planet">
                            <div className="planet-grid" onClick={() => { if(activeApp==='forge') setTelemetry(prev => [...prev.slice(-6), `[REGISTRY] Planetary Sector Claimed.`]); }}></div>
                        </div>
                        
                        <div className="dyson-ring-framework">
                            {blocks.map(b => {
                                const rad = (b.angle * Math.PI) / 180;
                                const x = Math.cos(rad) * b.radius; 
                                const y = Math.sin(rad) * b.radius;
                                
                                return (
                                    <div key={`pos-${b.id}`} className="block-orbit-position" style={{ transform: `translate(-50%, -50%) translate3d(${x}px, ${y}px, 0)` }}>
                                        
                                        {/* Local Rotation wrapper keeps the cube facing the right way */}
                                        <div className="block-local-rotation" style={{ transform: `rotateZ(${-b.angle}deg)` }}>
                                            <div 
                                                className={`block-interactive ${hoveredBlockId === b.id ? 'hovered' : ''}`}
                                                onMouseEnter={() => setHoveredBlockId(b.id)} onMouseLeave={() => setHoveredBlockId(null)}
                                                onClick={() => handleBlockClick(b)}
                                            >
                                                <div className="cube-3d">
                                                    <div className={`cube-face ${b.type === 'rwa' ? 'gold-top' : 'face-top'}`}></div>
                                                    <div className={`cube-face ${b.type === 'rwa' ? 'gold-front' : 'face-front'}`}></div>
                                                    <div className={`cube-face ${b.type === 'rwa' ? 'gold-right' : 'face-right'}`}></div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* The Axiom Uplink Beam (Outside local rotation so it always shoots straight UP) */}
                                        <div className={`cryptographic-uplink ${hoveredBlockId === b.id ? 'active' : ''}`}></div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* TOP UNIFIED PILL BAR */}
                    <div className="dasos-glass dasos-topbar">
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-2">
                                <svg width="24" height="24" viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="40" ry="12" fill="none" stroke="#fff" strokeWidth="4" transform="rotate(-15 50 65)"/><ellipse cx="50" cy="65" rx="35" ry="10" fill="none" stroke="#4DEEEA" strokeWidth="4" transform="rotate(15 50 65)"/></svg>
                                <span className="font-bold text-white tracking-widest text-sm">BLOCKS</span>
                            </div>
                            <span className="text-gray-500 border-l border-white/10 pl-6 text-xs">{activeApp ? activeApp : 'DESKTOP'}</span>
                        </div>
                        <div className="flex items-center gap-8 text-gray-400 font-mono text-xs">
                            <span className="text-cyan-400 flex flex-col items-end"><span className="text-[8px] text-gray-500">KINETIC FUEL</span>{eWatts.toLocaleString('en-US', {minimumFractionDigits: 2})} EW</span>
                            <span className="text-green-400 flex flex-col items-end"><span className="text-[8px] text-gray-500">STABLE RESERVE</span>{sov.toLocaleString('en-US', {minimumFractionDigits: 2})} SOV</span>
                            <span className="text-purple-400 flex flex-col items-end"><span className="text-[8px] text-gray-500">VOTING POWER</span>{gov.toFixed(0)} GOV</span>
                            <div className="h-6 w-px bg-white/10"></div>
                            <div className="flex items-center gap-2 text-white"><div className="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_8px_#10B981]"></div> ONLINE</div>
                        </div>
                    </div>

                    {/* LEFT WIDGET PANEL (Live Telemetry) */}
                    <div className="widget-panel-left">
                        <div className="dasos-glass widget flex flex-col h-64">
                            <p className="text-[10px] text-gray-500 font-mono uppercase tracking-widest mb-3 border-b border-white/10 pb-2">Live Telemetry</p>
                            <div className="flex-1 overflow-y-auto scroll-hide font-mono text-[10px] space-y-3 flex flex-col-reverse">
                                {telemetry.slice().reverse().map((log, i) => (
                                    <div key={i} className="text-gray-300 leading-snug border-l-2 border-cyan-500/50 pl-3">{log}</div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* RIGHT WIDGET PANEL (Space-Time Epoch) */}
                    <div className="widget-panel-right">
                        <div className="dasos-glass widget">
                            <p className="text-[10px] text-gray-500 font-mono uppercase tracking-widest mb-3 border-b border-white/10 pb-2">Space-Time Epoch</p>
                            <h3 className="text-3xl font-bold text-white font-mono">{epoch.toString().padStart(6, '0')}</h3>
                            <p className="text-xs text-emerald-400 font-mono mt-2">Block Height Synced</p>
                        </div>
                    </div>

                    {/* DYNAMIC ACTION BEAM */}
                    {actionBeam && <div className="action-beam" style={{ animation: 'beam-up 0.8s ease-out forwards' }}></div>}

                    {/* OS WINDOW */}
                    <div className={`dasos-glass dasos-window ${activeApp ? 'open' : ''}`}>
                        <div className="window-titlebar">
                            <div className="window-title">dasOS // {activeApp}</div>
                            <div className="window-controls">
                                <div className="win-btn" onClick={() => setActiveApp(null)}>_</div>
                                <div className="win-btn">□</div>
                                <div className="win-btn" onClick={() => setActiveApp(null)}>✕</div>
                            </div>
                        </div>
                        <div className="window-content">
                            {activeApp && renderAppContent()}
                        </div>
                    </div>

                    {/* BOTTOM DOCK */}
                    <div className="dasos-glass dasos-dock">
                        <div className={`dock-icon ${activeApp === 'identity' ? 'active' : ''}`} onClick={() => openApp('identity')} title="Sovereign Identity"><IconIdentity /></div>
                        <div className="w-px h-6 bg-white/10 self-center mx-1"></div>
                        <div className={`dock-icon ${activeApp === 'treasury' ? 'active' : ''}`} onClick={() => openApp('treasury')} title="Central Bank"><IconBank /></div>
                        <div className={`dock-icon ${activeApp === 'senate' ? 'active' : ''}`} onClick={() => openApp('senate')} title="Planetary Senate"><IconSenate /></div>
                        <div className={`dock-icon ${activeApp === 'forge' ? 'active' : ''}`} onClick={() => openApp('forge')} title="Civ Forge"><IconForge /></div>
                    </div>

                    {/* NODE INSPECTOR MODAL */}
                    <div className={`node-inspector-overlay ${selectedBlock ? 'active' : ''}`} onClick={() => setSelectedBlock(null)}>
                        {selectedBlock && (
                            <div className="dasos-glass p-8 rounded-2xl w-80 pointer-events-auto border-t-2 border-cyan-500 relative" onClick={e => e.stopPropagation()}>
                                <button className="absolute top-5 right-5 text-gray-500 hover:text-white" onClick={() => setSelectedBlock(null)}>✕</button>
                                <p className="text-[10px] text-cyan-400 font-mono uppercase tracking-widest mb-1">Cryptographic Node</p>
                                <h2 className="text-2xl font-bold text-white mb-6 font-mono">Block #{selectedBlock.id.toString().padStart(4, '0')}</h2>
                                
                                <div className="space-y-4">
                                    <div className="bg-black/40 border border-white/10 p-4 rounded-xl">
                                        <p className="text-[9px] text-gray-500 uppercase tracking-widest">Node Architecture</p>
                                        <p className={`text-sm font-bold mt-1 uppercase ${selectedBlock.type === 'rwa' ? 'text-[#D4AF37]' : 'text-cyan-400'}`}>
                                            {selectedBlock.type === 'rwa' ? 'Corporate RWA Anchor' : 'Bitopia Habitat Core'}
                                        </p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-black/40 border border-white/10 p-4 rounded-xl">
                                            <p className="text-[9px] text-gray-500 uppercase tracking-widest">Orbital Vector</p>
                                            <p className="text-sm text-white font-mono mt-1">{selectedBlock.angle}°</p>
                                        </div>
                                        <div className="bg-black/40 border border-white/10 p-4 rounded-xl">
                                            <p className="text-[9px] text-gray-500 uppercase tracking-widest">Network Yield</p>
                                            <p className="text-sm text-emerald-400 font-mono mt-1">
                                                {selectedBlock.type === 'rwa' ? '+ BTC Fee' : '+ EW Flow'}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
